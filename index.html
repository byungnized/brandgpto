  <body>
    <div id="root"></div>
    <footer class="static-share-footer" aria-label="공유 안내">
      <h2>다른 사람도 보려면</h2>
      <p class="hint">
        이 사이트는 <code style="font-size:0.85em;">index.html</code>과 <code style="font-size:0.85em;">assets/</code> 폴더가 함께 있어야 합니다. 아래 중 하나로 전체 폴더를 올리면 됩니다.
      </p>
      <ul>
        <li><strong>Netlify Drop</strong> — <a href="https://app.netlify.com/drop" target="_blank" rel="noopener noreferrer" style="color:#7dd3fc;">netlify.com/drop</a>에 <code>brandgpto</code> 폴더를 드래그</li>
        <li><strong>GitHub Pages</strong> — 저장소에 푸시 후 Settings → Pages에서 배포</li>
        <li><strong>Cloudflare Pages / Vercel</strong> — 같은 폴더를 프로젝트 루트로 연결</li>
        <li><strong>ZIP 공유</strong> — <code>brandgpto</code> 폴더를 압축해 보내고, 받는 사람은 압축 풀 뒤 로컬 서버로 열기</li>
      </ul>
      <button type="button" id="copy-html-btn">HTML 파일 복사하기</button>
      <p id="copy-html-status" role="status" aria-live="polite"></p>
    </footer>
    <script>
      (function () {
        var btn = document.getElementById("copy-html-btn");
        var status = document.getElementById("copy-html-status");
        if (!btn || !status) return;
        btn.addEventListener("click", function () {
          status.textContent = "";
          function ok(msg) {
            status.textContent = msg;
            status.style.color = "#86efac";
          }
          function err(msg) {
            status.textContent = msg;
            status.style.color = "#fca5a5";
          }
          if (location.protocol === "file:") {
            err("브라우저에서 파일을 직접 열면 복사 API가 막힐 수 있어요. 터미널에서 이 폴더로 이동 후 npx serve 실행 뒤, 열린 주소(예: http://localhost:3000)에서 다시 눌러 주세요.");
            return;
          }
          fetch("./index.html", { cache: "no-store" })
            .then(function (r) {
              if (!r.ok) throw new Error("load");
              return r.text();
            })
            .then(function (html) {
              return navigator.clipboard.writeText(html);
            })
            .then(function () {
              ok("index.html 내용을 클립보드에 복사했습니다. (동작하려면 assets 폴더도 같이 배포해야 합니다.)");
            })
            .catch(function () {
              err("복사에 실패했습니다. index.html을 에디터에서 직접 열어 전체 선택·복사해 주세요.");
            });
        });
      })();
    </script>
